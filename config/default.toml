# streamdeb — configuración declarativa
#
# Este archivo es el "estado por defecto" del repo. El servicio busca
# config en este orden:
#   1. $STREAMDEB_CONFIG (env var, si está definida)
#   2. ~/.config/streamdeb/config.toml  (preferencias del usuario)
#   3. <repo>/config/default.toml       (este archivo, fallback)
#
# Para personalizar sin tocar el repo:
#   cp config/default.toml ~/.config/streamdeb/config.toml
#
# El GUI configurador (en desarrollo) edita ~/.config/streamdeb/config.toml.
#
# Schema versionado: si rompemos compatibilidad subimos schema_version.

schema_version = 1


# ─────────────────────── settings ───────────────────────
[settings]
brillo             = 75      # brillo deck 10..100 (paso 10 en CONF)
fallback_seconds   = 300     # vuelve a SIS tras N s sin interacción (60..1800)
dim_seconds        = 1800    # apaga deck tras N s sin interacción (60..7200)
profile            = 2       # 1=con marcos · 2=sin marco externo · 3=LCARS
banner_enabled     = false   # si true, fallback va a página IDLE/BANNER en vez de SIS
theme_lcars        = "classic"  # nombre del tema en plugins/themes/ (solo si profile=3)
monitor_brightness = 100     # xrandr gamma del monitor externo (10..100)

[settings.api]
host = "http://192.168.18.10"
user = "StreamDeck"


